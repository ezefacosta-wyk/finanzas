<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis finanzas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#999;
  --surface:#fff;--surface2:#f7f6f3;--surface3:#f0ede8;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --green:#1a7a4a;--green-bg:#e8f7ef;
  --red:#b03030;--red-bg:#fdf0f0;
  --amber:#8a5f10;--amber-bg:#fef7e6;
  --blue:#1a4a8a;--blue-bg:#eef3fc;
  --teal:#0f6e56;--teal-bg:#e1f5ee;
  --accent:#2c5f9e;
  --page-bg:#f5f4f0;
}
@media(prefers-color-scheme:dark){
  :root{
    --ink:#f0ede8;--ink2:#aaa;--ink3:#666;
    --surface:#1c1c1e;--surface2:#242426;--surface3:#2c2c2e;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    --green:#4ade80;--green-bg:rgba(74,222,128,0.12);
    --red:#f87171;--red-bg:rgba(248,113,113,0.12);
    --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.12);
    --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);
    --teal:#5dcaa5;--teal-bg:rgba(93,202,165,0.12);
    --accent:#60a5fa;
    --page-bg:#111113;
  }
}
html,body{min-height:100vh;background:var(--page-bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--ink);font-size:14px;line-height:1.5}
.container{max-width:720px;margin:0 auto;padding:2rem 1.25rem 4rem}
h1{font-size:22px;font-weight:500;color:var(--ink);margin-bottom:2px}
h2{font-size:16px;font-weight:500;color:var(--ink);margin-bottom:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:transparent;border:0.5px solid var(--border2);border-radius:8px;color:var(--ink);padding:6px 12px;cursor:pointer;font-size:14px}
.month-nav button:hover{background:var(--surface2)}
.month-label{font-size:15px;font-weight:500;min-width:150px;text-align:center;color:var(--ink)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.5rem}
.metric{background:var(--surface2);border-radius:8px;padding:12px 14px}
.metric-label{font-size:12px;color:var(--ink3);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500;color:var(--ink)}
.metric-value.pos{color:var(--green)}
.metric-value.neg{color:var(--red)}
.tab-bar{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border);overflow-x:auto}
.tab{padding:8px 16px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;color:var(--ink2);margin-bottom:-1px;white-space:nowrap}
.tab.active{border-bottom-color:var(--accent);color:var(--accent);font-weight:500}
.tab:hover{color:var(--ink)}
.view{display:none}.view.active{display:block}
.sections{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:520px){.sections{grid-template-columns:1fr}}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.field-row label{flex:1;font-size:13px;color:var(--ink2)}
.field-row input{width:120px;padding:6px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--ink);font-size:13px;text-align:right}
.field-row input:focus{outline:2px solid var(--accent);outline-offset:1px}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-row input{flex:1;padding:6px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--ink);font-size:13px}
.add-row input:focus{outline:2px solid var(--accent);outline-offset:1px}
.btn-sm{padding:6px 12px;border:0.5px solid var(--border2);border-radius:6px;background:transparent;color:var(--ink);cursor:pointer;font-size:13px;white-space:nowrap}
.btn-sm:hover{background:var(--surface2)}
.btn-sm.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm.primary:hover{opacity:0.9}
.btn-icon{background:transparent;border:none;color:var(--ink3);cursor:pointer;padding:2px 6px;font-size:16px;line-height:1}
.btn-icon:hover{color:var(--red)}
.item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-name{flex:1;font-size:13px;color:var(--ink)}
.item-amount{font-size:13px;font-weight:500;color:var(--ink);min-width:90px;text-align:right}
.tarjeta-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.tarjeta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.tarjeta-title{font-size:14px;font-weight:500;color:var(--ink)}
.tarjeta-rename{background:transparent;border:none;color:var(--ink2);font-size:12px;text-align:right;max-width:140px;padding:2px 4px;border-radius:4px}
.tarjeta-rename:hover{background:var(--surface2)}
.tarjeta-rename:focus{outline:1px solid var(--accent)}
.tarjeta-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.tarjeta-field{display:flex;flex-direction:column;gap:3px}
.tarjeta-field label{font-size:11px;color:var(--ink3)}
.tarjeta-field .prefix{display:flex;align-items:center;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);overflow:hidden}
.tarjeta-field .prefix span{padding:6px 7px;font-size:11px;font-weight:500;color:var(--ink3);border-right:0.5px solid var(--border2);background:var(--surface3);white-space:nowrap}
.tarjeta-field .prefix input{border:none;background:transparent;flex:1;min-width:0;padding:6px 8px;color:var(--ink);font-size:13px}
.tarjeta-field .prefix input:focus{outline:none}
.usd-section{margin-top:6px;padding-top:10px;border-top:0.5px dashed var(--border2)}
.usd-label{font-size:11px;color:var(--ink3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.pago-sugerido{background:var(--blue-bg);border-radius:8px;padding:10px 14px;margin-top:10px}
.pago-sugerido-label{font-size:11px;color:var(--blue);margin-bottom:4px}
.pago-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.pago-amount{font-size:18px;font-weight:500;color:var(--blue)}
.pago-usd{font-size:12px;font-weight:500;color:var(--teal);background:var(--teal-bg);padding:2px 8px;border-radius:20px}
.pago-sugerido-desc{font-size:11px;color:var(--ink3);margin-top:4px}
.alerta{border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px}
.alerta.danger{background:var(--red-bg);color:var(--red)}
.alerta.warn{background:var(--amber-bg);color:var(--amber)}
.full-card{grid-column:1/-1}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>Mis finanzas</h1>
      <p style="font-size:13px;color:var(--ink3)">Panel personal mensual</p>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="metric"><div class="metric-label">Ingresos totales</div><div class="metric-value pos" id="s-ingresos">$0</div></div>
    <div class="metric"><div class="metric-label">Gastos fijos</div><div class="metric-value" id="s-fijos">$0</div></div>
    <div class="metric"><div class="metric-label">Tarjetas (ARS)</div><div class="metric-value" id="s-tarjetas">$0</div></div>
    <div class="metric"><div class="metric-label">Tarjetas (USD)</div><div class="metric-value" id="s-tarjetas-usd" style="color:var(--teal)">U$S 0</div></div>
    <div class="metric"><div class="metric-label">Disponible</div><div class="metric-value" id="s-disponible">$0</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('ingresos',this)"><i class="ti ti-wallet"></i> Ingresos</button>
    <button class="tab" onclick="showTab('tarjetas',this)"><i class="ti ti-credit-card"></i> Tarjetas</button>
    <button class="tab" onclick="showTab('servicios',this)"><i class="ti ti-building"></i> Servicios</button>
    <button class="tab" onclick="showTab('gastos',this)"><i class="ti ti-shopping-cart"></i> Otros gastos</button>
  </div>

  <div id="view-ingresos" class="view active">
    <div class="sections">
      <div class="card">
        <h2>Sueldo neto</h2>
        <div class="field-row">
          <label>Monto</label>
          <input type="number" id="sueldo" placeholder="0" oninput="save();recalc()">
        </div>
      </div>
      <div class="card">
        <h2>Ingresos extra</h2>
        <div id="extra-list"></div>
        <div class="add-row">
          <input type="text" id="extra-name" placeholder="Descripción">
          <input type="number" id="extra-amt" placeholder="Monto" style="width:90px">
          <button class="btn-sm primary" onclick="addExtra()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-tarjetas" class="view">
    <div id="tarjetas-container"></div>
  </div>

  <div id="view-servicios" class="view">
    <div class="card">
      <h2>Servicios y gastos fijos</h2>
      <div id="servicios-list"></div>
      <div class="add-row" style="margin-top:10px">
        <input type="text" id="serv-name" placeholder="Nombre del servicio">
        <input type="number" id="serv-amt" placeholder="Monto" style="width:100px">
        <button class="btn-sm primary" onclick="addServicio()"><i class="ti ti-plus"></i></button>
      </div>
    </div>
  </div>

  <div id="view-gastos" class="view">
    <div class="sections">
      <div class="card">
        <h2>Super / Mercado</h2>
        <div class="field-row">
          <label>Estimado mensual</label>
          <input type="number" id="super-amt" placeholder="0" oninput="save();recalc()">
        </div>
      </div>
      <div class="card full-card">
        <h2>Gastos extra del mes</h2>
        <div id="gastos-extra-list"></div>
        <div class="add-row">
          <input type="text" id="gextra-name" placeholder="Descripción">
          <input type="number" id="gextra-amt" placeholder="Monto" style="width:100px">
          <button class="btn-sm primary" onclick="addGastoExtra()"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div class="alerta" id="alerta-global" style="display:none"></div>

</div>

<script>
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SERVICIOS_DEFAULT=['Luz','Gas','Expensas','Alquiler','Internet','Celular','Obra social'];
const TARJETAS_DEFAULT=['Tarjeta 1','Tarjeta 2'];

let now=new Date(), curYear=now.getFullYear(), curMonth=now.getMonth();

function monthKey(){return 'fin_'+curYear+'_'+curMonth;}

function getState(){
  try{const r=localStorage.getItem(monthKey());if(r)return JSON.parse(r);}catch(e){}
  return defaultState();
}

function defaultState(){
  return {
    sueldo:'',
    extras:[],
    tarjetas:TARJETAS_DEFAULT.map(n=>({name:n,total:0,minimo:0,usdTotal:0,usdMinimo:0,tcambio:0})),
    servicios:SERVICIOS_DEFAULT.map(n=>({name:n,amt:0})),
    superAmt:'',
    gastosExtra:[]
  };
}

let state=getState();

function save(){
  state.sueldo=parseFloat(document.getElementById('sueldo').value)||0;
  state.superAmt=parseFloat(document.getElementById('super-amt').value)||0;
  try{localStorage.setItem(monthKey(),JSON.stringify(state));}catch(e){}
}

function fmt(n){return '$'+Math.round(n).toLocaleString('es-AR');}
function fmtUSD(n){return n?'U$S '+parseFloat(n).toFixed(2):'U$S 0';}

function changeMonth(d){
  save();
  curMonth+=d;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  state=getState();
  renderAll();
}

function showTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
}

function totalIngresos(){
  const s=parseFloat(document.getElementById('sueldo').value)||0;
  return s+state.extras.reduce((a,e)=>a+e.amt,0);
}

function calcPagoSugerido(t,ingresos,otrosGastos){
  const reserva=ingresos*0.10;
  const disponible=Math.max(0,ingresos-otrosGastos-reserva);
  return Math.min(t.total,Math.max(t.minimo||0,disponible));
}

function renderAll(){
  document.getElementById('monthLabel').textContent=MESES[curMonth]+' '+curYear;
  document.getElementById('sueldo').value=state.sueldo||'';
  document.getElementById('super-amt').value=state.superAmt||'';
  renderExtras();
  renderTarjetas();
  renderServicios();
  renderGastosExtra();
  recalc();
}

function renderExtras(){
  document.getElementById('extra-list').innerHTML=state.extras.map((e,i)=>`
    <div class="item-row">
      <span class="item-name">${e.name}</span>
      <span class="item-amount">${fmt(e.amt)}</span>
      <button class="btn-icon" onclick="removeExtra(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function addExtra(){
  const n=document.getElementById('extra-name').value.trim();
  const a=parseFloat(document.getElementById('extra-amt').value)||0;
  if(!n||!a)return;
  state.extras.push({name:n,amt:a});
  document.getElementById('extra-name').value='';
  document.getElementById('extra-amt').value='';
  save();renderExtras();recalc();
}
function removeExtra(i){state.extras.splice(i,1);save();renderExtras();recalc();}

function renderTarjetas(){
  const ingresos=totalIngresos();
  const superAmt=parseFloat(document.getElementById('super-amt')?.value)||0;
  const servicios=state.servicios.reduce((a,s)=>a+s.amt,0);
  const gastosExtra=state.gastosExtra.reduce((a,g)=>a+g.amt,0);
  const otrosGastos=servicios+superAmt+gastosExtra;

  document.getElementById('tarjetas-container').innerHTML=state.tarjetas.map((t,i)=>{
    const sugerido=calcPagoSugerido(t,ingresos,otrosGastos);
    const puedeTotal=t.total>0&&t.total<=(ingresos-otrosGastos-ingresos*0.10);
    const tieneUSD=t.usdTotal>0||t.usdMinimo>0;
    const usdEnPesos=t.tcambio>0?t.usdTotal*t.tcambio:0;
    return `
    <div class="tarjeta-card">
      <div class="tarjeta-header">
        <span class="tarjeta-title"><i class="ti ti-credit-card" style="margin-right:6px"></i>${t.name}</span>
        <input class="tarjeta-rename" type="text" value="${t.name}" onchange="renameTarjeta(${i},this.value)" title="Renombrar tarjeta">
      </div>
      <p style="font-size:11px;color:var(--ink3);margin-bottom:8px">Saldo en pesos</p>
      <div class="tarjeta-fields">
        <div class="tarjeta-field">
          <label>Total a pagar</label>
          <div class="prefix"><span>$</span><input type="number" value="${t.total||''}" placeholder="0" oninput="updateTarjeta(${i},'total',this.value)"></div>
        </div>
        <div class="tarjeta-field">
          <label>Pago mínimo</label>
          <div class="prefix"><span>$</span><input type="number" value="${t.minimo||''}" placeholder="0" oninput="updateTarjeta(${i},'minimo',this.value)"></div>
        </div>
      </div>
      <div class="usd-section">
        <div class="usd-label"><i class="ti ti-currency-dollar" style="font-size:13px;color:var(--teal)"></i> Saldo en dólares</div>
        <div class="tarjeta-fields">
          <div class="tarjeta-field">
            <label>Total a pagar</label>
            <div class="prefix"><span>U$S</span><input type="number" value="${t.usdTotal||''}" placeholder="0.00" step="0.01" oninput="updateTarjeta(${i},'usdTotal',this.value)"></div>
          </div>
          <div class="tarjeta-field">
            <label>Pago mínimo</label>
            <div class="prefix"><span>U$S</span><input type="number" value="${t.usdMinimo||''}" placeholder="0.00" step="0.01" oninput="updateTarjeta(${i},'usdMinimo',this.value)"></div>
          </div>
        </div>
        ${tieneUSD?`
        <div class="tarjeta-field" style="margin-top:6px">
          <label>Tipo de cambio (para referencia)</label>
          <div class="prefix"><span>$</span><input type="number" value="${t.tcambio||''}" placeholder="Cotización" oninput="updateTarjeta(${i},'tcambio',this.value)"></div>
        </div>
        ${t.tcambio>0?`<p style="font-size:11px;color:var(--ink3);margin-top:6px">Equivalente en pesos: <strong style="color:var(--teal)">${fmt(usdEnPesos)}</strong></p>`:''}
        `:''}
      </div>
      ${t.total>0?`
      <div class="pago-sugerido">
        <div class="pago-sugerido-label"><i class="ti ti-calculator"></i> Pago sugerido en pesos</div>
        <div class="pago-row">
          <span class="pago-amount">${fmt(sugerido)}</span>
          ${t.usdTotal>0?`<span class="pago-usd">+ ${fmtUSD(t.usdMinimo||t.usdTotal)} USD</span>`:''}
        </div>
        <div class="pago-sugerido-desc">${puedeTotal?'Podés pagar el total completo':'Máximo posible sin quedarte sin margen (reserva 10% del sueldo)'}</div>
      </div>
      `:''}
    </div>`;
  }).join('')+`
  <button class="btn-sm" onclick="addTarjeta()"><i class="ti ti-plus"></i> Agregar tarjeta</button>`;
}

function renameTarjeta(i,v){state.tarjetas[i].name=v;save();renderTarjetas();}
function addTarjeta(){state.tarjetas.push({name:'Nueva tarjeta',total:0,minimo:0,usdTotal:0,usdMinimo:0,tcambio:0});save();renderTarjetas();}
function updateTarjeta(i,k,v){state.tarjetas[i][k]=parseFloat(v)||0;save();renderTarjetas();recalc();}

function renderServicios(){
  document.getElementById('servicios-list').innerHTML=state.servicios.map((s,i)=>`
    <div class="item-row">
      <span class="item-name">${s.name}</span>
      <input type="number" value="${s.amt||''}" placeholder="0" oninput="updateServicio(${i},this.value)" style="width:110px;padding:5px 8px;border:0.5px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--ink);font-size:13px;text-align:right">
      <button class="btn-icon" onclick="removeServicio(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function updateServicio(i,v){state.servicios[i].amt=parseFloat(v)||0;save();recalc();}
function removeServicio(i){state.servicios.splice(i,1);save();renderServicios();recalc();}
function addServicio(){
  const n=document.getElementById('serv-name').value.trim();
  const a=parseFloat(document.getElementById('serv-amt').value)||0;
  if(!n)return;
  state.servicios.push({name:n,amt:a});
  document.getElementById('serv-name').value='';
  document.getElementById('serv-amt').value='';
  save();renderServicios();recalc();
}

function renderGastosExtra(){
  document.getElementById('gastos-extra-list').innerHTML=state.gastosExtra.map((g,i)=>`
    <div class="item-row">
      <span class="item-name">${g.name}</span>
      <span class="item-amount">${fmt(g.amt)}</span>
      <button class="btn-icon" onclick="removeGastoExtra(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
}
function addGastoExtra(){
  const n=document.getElementById('gextra-name').value.trim();
  const a=parseFloat(document.getElementById('gextra-amt').value)||0;
  if(!n||!a)return;
  state.gastosExtra.push({name:n,amt:a});
  document.getElementById('gextra-name').value='';
  document.getElementById('gextra-amt').value='';
  save();renderGastosExtra();recalc();
}
function removeGastoExtra(i){state.gastosExtra.splice(i,1);save();renderGastosExtra();recalc();}

function recalc(){
  const ingresos=totalIngresos();
  const servicios=state.servicios.reduce((a,s)=>a+s.amt,0);
  const superAmt=parseFloat(document.getElementById('super-amt')?.value)||0;
  const gastosExtra=state.gastosExtra.reduce((a,g)=>a+g.amt,0);
  const otrosGastos=servicios+superAmt+gastosExtra;

  let tarjetasARS=0, tarjetasUSD=0;
  state.tarjetas.forEach(t=>{
    const reserva=ingresos*0.10;
    const disponible=Math.max(0,ingresos-otrosGastos-reserva);
    tarjetasARS+=Math.min(t.total,Math.max(t.minimo||0,disponible));
    tarjetasUSD+=t.usdTotal||0;
  });

  const totalGastos=otrosGastos+tarjetasARS;
  const disponible=ingresos-totalGastos;

  document.getElementById('s-ingresos').textContent=fmt(ingresos);
  document.getElementById('s-fijos').textContent=fmt(otrosGastos);
  document.getElementById('s-tarjetas').textContent=fmt(tarjetasARS);
  document.getElementById('s-tarjetas-usd').textContent=fmtUSD(tarjetasUSD);
  document.getElementById('s-disponible').textContent=fmt(disponible);
  document.getElementById('s-disponible').className='metric-value '+(disponible>0?'pos':disponible<0?'neg':'');

  const al=document.getElementById('alerta-global');
  if(!ingresos){al.style.display='none';return;}
  if(disponible<0){al.className='alerta danger';al.textContent='Los gastos en pesos superan los ingresos. Revisá los montos.';al.style.display='block';}
  else if(disponible<ingresos*0.05){al.className='alerta warn';al.textContent='Margen muy ajustado. Quedás con menos del 5% de los ingresos.';al.style.display='block';}
  else{al.style.display='none';}
}

renderAll();
</script>
</body>
</html>
